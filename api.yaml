# ─── Components ──────────────────────────────────────────────────────────────

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Missing or invalid fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: name is required.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: User not found.
    Conflict:
      description: Unique constraint or foreign key violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Conflict.

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string

    # ── Users ──

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alex Rider
        email:
          type: string
          format: email
          example: alex@example.com
        skill_level:
          type: integer
          minimum: 1
          maximum: 5
          example: 3
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name, email, skill_level]
      properties:
        name:
          type: string
          example: Alex Rider
        email:
          type: string
          format: email
          example: alex@example.com
        skill_level:
          type: integer
          minimum: 1
          maximum: 5
          example: 3

    UserPatch:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        skill_level:
          type: integer
          minimum: 1
          maximum: 5

    # ── Brands ──

    Brand:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Cabrinha
        webpage:
          type: string
          nullable: true
          example: https://www.cabrinha.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BrandInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Cabrinha
        webpage:
          type: string
          nullable: true
          example: https://www.cabrinha.com

    BrandPatch:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        webpage:
          type: string
          nullable: true

    # ── Kites ──

    Kite:
      type: object
      properties:
        id:
          type: integer
          example: 1
        brand_id:
          type: integer
          example: 1
        brand_name:
          type: string
          example: Cabrinha
        name:
          type: string
          example: Switchblade
        year:
          type: integer
          nullable: true
          example: 2023
        size:
          type: number
          nullable: true
          example: 12
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    KiteInput:
      type: object
      required: [brand_id, name]
      properties:
        brand_id:
          type: integer
          example: 1
        name:
          type: string
          example: Switchblade
        year:
          type: integer
          nullable: true
          example: 2023
        size:
          type: number
          nullable: true
          example: 12

    KitePatch:
      type: object
      minProperties: 1
      properties:
        brand_id:
          type: integer
        name:
          type: string
        year:
          type: integer
          nullable: true
        size:
          type: number
          nullable: true

    # ── Owned Kites ──

    OwnedKite:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
