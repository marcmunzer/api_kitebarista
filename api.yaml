openapi: 3.0.3
info:
  title: KiteBarista API
  version: 1.0.0
  description: >
    REST API for the KiteBarista kite surfing session tracker.
    All requests and responses use JSON. Timestamps are returned in ISO 8601 format.

servers:
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Health
  - name: Users
  - name: Brands
  - name: Kites
  - name: Owned Kites
  - name: Sessions
  - name: Locations
  - name: Forecasts
  - name: Measurements

paths:

  # ─── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ─── Users ─────────────────────────────────────────────────────────────────

  /users:
    get:
      summary: List all users
      tags: [Users]
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get a user
      tags: [Users]
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Replace a user (all fields required)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      summary: Partially update a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a user
      tags: [Users]
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

